<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square (sticker shape) -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="#0CC755"/>

  <!-- Cute face -->
  <!-- Left eye -->
  <ellipse cx="11" cy="14" rx="2.5" ry="3" fill="white"/>
  <circle cx="11.5" cy="14.5" r="1.2" fill="#222"/>

  <!-- Right eye -->
  <ellipse cx="21" cy="14" rx="2.5" ry="3" fill="white"/>
  <circle cx="21.5" cy="14.5" r="1.2" fill="#222"/>

  <!-- Happy smile -->
  <path d="M10 21 Q16 26 22 21" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Rosy cheeks -->
  <circle cx="7" cy="19" r="2" fill="#ff9999" opacity="0.6"/>
  <circle cx="25" cy="19" r="2" fill="#ff9999" opacity="0.6"/>
</svg>
